<!DOCTYPE html>
<html>
<head>
<title>My Login Website</title>

<style>

body{
font-family:Arial;
background:#1877f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
width:320px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
text-align:center;
}

h1{
color:#1877f2;
}

input{
width:90%;
padding:12px;
margin:8px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:95%;
padding:12px;
margin:8px;
border:none;
border-radius:6px;
background:#1877f2;
color:white;
font-size:16px;
cursor:pointer;
}

.signup{
background:#42b72a;
}

</style>

</head>

<body>

<div class="box">

<h1>Login</h1>

<input type="email" placeholder="Email">
<input type="password" placeholder="Password">

<button>Log In</button>

<hr>

<button class="signup">Create New Account</button>

</div>

</body>
  </html>
